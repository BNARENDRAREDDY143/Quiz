<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillCraft · Interactive Quiz Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .quiz-container {
      width: 100%;
      max-width: 800px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 30px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      animation: slideIn 0.5s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .quiz-header {
      background: linear-gradient(135deg, #2b1b4e, #5b4b8a);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .quiz-header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #fff, #e0d0ff);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }

    .quiz-header p {
      font-size: 1.1rem;
      opacity: 0.9;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      margin-top: 20px;
    }

    .progress-fill {
      height: 100%;
      background: #ffdb7e;
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .quiz-content {
      padding: 40px;
    }

    .question-number {
      color: #2b1b4e;
      font-weight: 600;
      margin-bottom: 15px;
      font-size: 1.1rem;
    }

    .question-text {
      font-size: 1.6rem;
      color: #1e1b3a;
      margin-bottom: 30px;
      font-weight: 600;
      line-height: 1.4;
    }

    .options-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 30px;
    }

    .option {
      display: flex;
      align-items: center;
      padding: 15px 20px;
      background: #f8f6ff;
      border: 2px solid #e2d9ff;
      border-radius: 15px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .option:hover {
      background: #eae6ff;
      border-color: #8b5cf6;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(107, 70, 193, 0.2);
    }

    .option.selected {
      background: #8b5cf6;
      border-color: #5b4b8a;
      color: white;
    }

    .option input {
      margin-right: 15px;
      width: 20px;
      height: 20px;
      cursor: pointer;
    }

    .option.checkbox-option {
      display: flex;
      align-items: center;
    }

    .option input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin-right: 15px;
    }

    .fill-blank-input {
      width: 100%;
      padding: 15px 20px;
      font-size: 1.1rem;
      border: 2px solid #e2d9ff;
      border-radius: 15px;
      outline: none;
      transition: all 0.3s ease;
      background: #f8f6ff;
    }

    .fill-blank-input:focus {
      border-color: #8b5cf6;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
    }

    .fill-blank-input.error {
      border-color: #ef4444;
      animation: shake 0.3s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .button-container {
      display: flex;
      justify-content: space-between;
      gap: 15px;
      margin-top: 30px;
    }

    .btn {
      padding: 15px 30px;
      font-size: 1.1rem;
      font-weight: 600;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      transition: all 0.3s ease;
      flex: 1;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-primary {
      background: #2b1b4e;
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: #401e8b;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(43, 27, 78, 0.3);
    }

    .btn-secondary {
      background: #e2d9ff;
      color: #2b1b4e;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #cbb9ff;
      transform: translateY(-2px);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Score Modal */
    .score-modal {
      background: white;
      border-radius: 30px;
      padding: 40px;
      text-align: center;
    }

    .score-title {
      font-size: 2.5rem;
      color: #2b1b4e;
      margin-bottom: 20px;
    }

    .score-circle {
      width: 200px;
      height: 200px;
      margin: 30px auto;
      background: linear-gradient(135deg, #2b1b4e, #8b5cf6);
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      box-shadow: 0 20px 30px rgba(107, 70, 193, 0.3);
    }

    .score-number {
      font-size: 4rem;
      font-weight: 700;
      line-height: 1;
    }

    .score-total {
      font-size: 1.5rem;
      opacity: 0.9;
    }

    .score-message {
      font-size: 1.3rem;
      color: #4a5568;
      margin-bottom: 30px;
    }

    .question-type-badge {
      display: inline-block;
      padding: 5px 15px;
      background: #e2d9ff;
      color: #2b1b4e;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 15px;
    }

    /* Timer */
    .timer {
      text-align: right;
      font-size: 1.2rem;
      font-weight: 600;
      color: #2b1b4e;
      margin-bottom: 20px;
    }

    .timer.warning {
      color: #ef4444;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 20px;
      color: #cdc3ea;
      font-size: 0.9rem;
    }

    @media (max-width: 768px) {
      .quiz-content {
        padding: 20px;
      }

      .question-text {
        font-size: 1.3rem;
      }

      .btn {
        padding: 12px 20px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="quiz-container" id="quizContainer">
    <div class="quiz-header">
      <h1>🧠Quiz</h1>
      <p>Test your knowledge with interactive questions!</p>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
    </div>

    <div class="quiz-content" id="quizContent">
      <!-- Quiz content will be dynamically inserted here -->
    </div>

    <div class="footer" id="footer">
      © 2026 SkillCraft Technology · Interactive Quiz Game
    </div>
  </div>

  <script>
    const quizData = [
      {
        type: 'single',
        question: 'What does HTML stand for?',
        options: [
          'Hyper Text Markup Language',
          'High Tech Modern Language',
          'Hyper Transfer Markup Language',
          'Home Tool Markup Language'
        ],
        correct: 0,
        explanation: 'HTML stands for Hyper Text Markup Language, the standard markup language for web pages.'
      },
      {
        type: 'multi',
        question: 'Which of the following are JavaScript frameworks? (Select all that apply)',
        options: [
          'React',
          'Django',
          'Vue.js',
          'Flask'
        ],
        correct: [0, 2],
        explanation: 'React and Vue.js are JavaScript frameworks. Django and Flask are Python frameworks.'
      },
      {
        type: 'fill',
        question: 'The CSS property used to change the text color is called _____',
        correct: ['color', 'colour'],
        explanation: 'The CSS property for text color is "color" (US spelling).'
      },
      {
        type: 'single',
        question: 'Which symbol is used for comments in JavaScript?',
        options: [
          '//',
          '<!-- -->',
          '#',
          '/* */'
        ],
        correct: 0,
        explanation: '// is used for single-line comments in JavaScript. /* */ is for multi-line comments.'
      },
      {
        type: 'multi',
        question: 'Which of these are valid CSS units? (Select all that apply)',
        options: [
          'px',
          'em',
          'rem',
          'pt'
        ],
        correct: [0, 1, 2, 3],
        explanation: 'All of these are valid CSS units: px (pixels), em (relative to parent), rem (relative to root), and pt (points).'
      },
      {
        type: 'fill',
        question: 'The JavaScript method to add an element at the end of an array is called push() or _____?',
        correct: ['push', 'push()'],
        explanation: 'The correct method is push(). It adds one or more elements to the end of an array.'
      }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let userAnswers = [];
    let timerInterval;
    let timeLeft = 30;

    const quizContent = document.getElementById('quizContent');
    const progressFill = document.getElementById('progressFill');

    function startTimer() {
      timeLeft = 30;
      updateTimerDisplay();
      
      if (timerInterval) clearInterval(timerInterval);
      
      timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerDisplay();
        
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          handleTimeOut();
        }
      }, 1000);
    }

    function updateTimerDisplay() {
      const timerElement = document.querySelector('.timer');
      if (timerElement) {
        timerElement.textContent = `⏱️ ${timeLeft}s`;
        if (timeLeft <= 10) {
          timerElement.classList.add('warning');
        } else {
          timerElement.classList.remove('warning');
        }
      }
    }

    function handleTimeOut() {
      const currentQuestion = quizData[currentQuestionIndex];
      
      if (currentQuestion.type === 'fill') {
        const input = document.querySelector('.fill-blank-input');
        if (input && !input.value.trim()) {
          input.classList.add('error');
          setTimeout(() => input.classList.remove('error'), 500);
        }
      }
      
      // Auto-move to next question after timeout
      setTimeout(() => {
        if (currentQuestionIndex < quizData.length - 1) {
          nextQuestion();
        } else {
          showResults();
        }
      }, 1000);
    }

    function renderQuestion() {
      const question = quizData[currentQuestionIndex];
      let html = `
        <div class="question-number">Question ${currentQuestionIndex + 1}/${quizData.length}</div>
        <div class="question-type-badge">${getQuestionTypeIcon(question.type)} ${getQuestionTypeName(question.type)}</div>
        <div class="question-text">${question.question}</div>
        <div class="timer">⏱️ ${timeLeft}s</div>
      `;

      switch (question.type) {
        case 'single':
          html += renderSingleChoice(question);
          break;
        case 'multi':
          html += renderMultiChoice(question);
          break;
        case 'fill':
          html += renderFillBlank(question);
          break;
      }

      html += `
        <div class="button-container">
          <button class="btn btn-secondary" onclick="previousQuestion()" ${currentQuestionIndex === 0 ? 'disabled' : ''}>Previous</button>
          <button class="btn btn-primary" onclick="submitAnswer()">${currentQuestionIndex === quizData.length - 1 ? 'Finish' : 'Next'}</button>
        </div>
      `;

      quizContent.innerHTML = html;
      
      // Restore user's previous answer if exists
      if (userAnswers[currentQuestionIndex] !== undefined) {
        restoreAnswer(question.type, userAnswers[currentQuestionIndex]);
      }
      
      // Start timer for new question
      startTimer();
      
      // Update progress bar
      updateProgress();
    }

    function getQuestionTypeIcon(type) {
      switch(type) {
        case 'single': return '⚪';
        case 'multi': return '☑️';
        case 'fill': return '✏️';
        default: return '❓';
      }
    }

    function getQuestionTypeName(type) {
      switch(type) {
        case 'single': return 'Single Choice';
        case 'multi': return 'Multiple Choice';
        case 'fill': return 'Fill in the Blank';
        default: return 'Question';
      }
    }

    function renderSingleChoice(question) {
      let html = '<div class="options-container">';
      question.options.forEach((option, index) => {
        html += `
          <label class="option">
            <input type="radio" name="answer" value="${index}" onchange="handleOptionChange()">
            <span>${option}</span>
          </label>
        `;
      });
      html += '</div>';
      return html;
    }

    function renderMultiChoice(question) {
      let html = '<div class="options-container">';
      question.options.forEach((option, index) => {
        html += `
          <label class="option checkbox-option">
            <input type="checkbox" name="answer" value="${index}" onchange="handleOptionChange()">
            <span>${option}</span>
          </label>
        `;
      });
      html += '</div>';
      return html;
    }

    function renderFillBlank(question) {
      return `
        <div class="options-container">
          <input type="text" class="fill-blank-input" placeholder="Type your answer here..." oninput="handleOptionChange()">
        </div>
      `;
    }

    function handleOptionChange() {
      // Clear timer when user interacts
      // (optional behavior - can be removed if you want timer to continue)
    }

    function restoreAnswer(type, answer) {
      if (type === 'single') {
        const radio = document.querySelector(`input[value="${answer}"]`);
        if (radio) radio.checked = true;
      } else if (type === 'multi' && Array.isArray(answer)) {
        answer.forEach(val => {
          const checkbox = document.querySelector(`input[value="${val}"]`);
          if (checkbox) checkbox.checked = true;
        });
      } else if (type === 'fill') {
        const input = document.querySelector('.fill-blank-input');
        if (input) input.value = answer;
      }
    }

    function submitAnswer() {
      const question = quizData[currentQuestionIndex];
      let answer = getUserAnswer(question.type);
      
      if (answer === null || answer === undefined || (question.type === 'fill' && !answer.trim())) {
        showToast('Please provide an answer before proceeding!', 'error');
        return;
      }

      // Save answer
      userAnswers[currentQuestionIndex] = answer;

      // Check if answer is correct and update score
      const isCorrect = checkAnswer(question, answer);
      if (isCorrect) {
        score++;
        showToast('✅ Correct!', 'success');
      } else {
        showToast('❌ Incorrect', 'error');
      }

      // Clear timer for this question
      clearInterval(timerInterval);

      // Move to next question or show results
      if (currentQuestionIndex < quizData.length - 1) {
        currentQuestionIndex++;
        renderQuestion();
      } else {
        showResults();
      }
    }

    function getUserAnswer(type) {
      if (type === 'single') {
        const selected = document.querySelector('input[name="answer"]:checked');
        return selected ? parseInt(selected.value) : null;
      } else if (type === 'multi') {
        const checkboxes = document.querySelectorAll('input[name="answer"]:checked');
        return checkboxes.length > 0 ? Array.from(checkboxes).map(cb => parseInt(cb.value)) : null;
      } else if (type === 'fill') {
        const input = document.querySelector('.fill-blank-input');
        return input ? input.value.trim() : '';
      }
      return null;
    }

    function checkAnswer(question, answer) {
      if (question.type === 'single') {
        return answer === question.correct;
      } else if (question.type === 'multi') {
        if (!Array.isArray(answer) || answer.length !== question.correct.length) return false;
        return answer.sort().toString() === question.correct.sort().toString();
      } else if (question.type === 'fill') {
        const normalizedAnswer = answer.toLowerCase().trim();
        return question.correct.some(correct => 
          normalizedAnswer === correct.toLowerCase().trim()
        );
      }
      return false;
    }

    function previousQuestion() {
      if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        clearInterval(timerInterval);
        renderQuestion();
      }
    }

    function nextQuestion() {
      submitAnswer();
    }

    function showResults() {
      clearInterval(timerInterval);
      
      const percentage = (score / quizData.length) * 100;
      let message = '';
      
      if (percentage >= 80) {
        message = '🏆 Excellent! You\'re a quiz master!';
      } else if (percentage >= 60) {
        message = '👍 Good job! Keep learning!';
      } else if (percentage >= 40) {
        message = '📚 Fair effort! Practice makes perfect!';
      } else {
        message = '💪 Don\'t give up! Try again to improve!';
      }

      quizContent.innerHTML = `
        <div class="score-modal">
          <h2 class="score-title">Quiz Complete!</h2>
          <div class="score-circle">
            <span class="score-number">${score}</span>
            <span class="score-total">/${quizData.length}</span>
          </div>
          <p class="score-message">${message}</p>
          
          <div style="margin: 30px 0; text-align: left; background: #f8f6ff; padding: 20px; border-radius: 15px;">
            <h3 style="color: #2b1b4e; margin-bottom: 15px;">📊 Review Answers</h3>
            ${quizData.map((q, index) => {
              const userAnswer = userAnswers[index];
              const isCorrect = userAnswer !== undefined ? checkAnswer(q, userAnswer) : false;
              return `
                <div style="margin-bottom: 15px; padding: 10px; background: white; border-radius: 10px; border-left: 4px solid ${isCorrect ? '#10b981' : '#ef4444'};">
                  <p style="font-weight: 600; margin-bottom: 5px;">Q${index + 1}: ${q.question.substring(0, 50)}...</p>
                  <p style="color: ${isCorrect ? '#10b981' : '#ef4444'}; font-size: 0.9rem;">
                    ${isCorrect ? '✓ Correct' : '✗ Incorrect'}
                  </p>
                  ${!isCorrect && q.explanation ? `<p style="color: #6b7280; font-size: 0.9rem; margin-top: 5px;">💡 ${q.explanation}</p>` : ''}
                </div>
              `;
            }).join('')}
          </div>

          <div class="button-container">
            <button class="btn btn-primary" onclick="restartQuiz()">🔄 Try Again</button>
          </div>
        </div>
      `;
      
      progressFill.style.width = '100%';
    }

    function restartQuiz() {
      currentQuestionIndex = 0;
      score = 0;
      userAnswers = [];
      timeLeft = 30;
      renderQuestion();
    }

    function updateProgress() {
      const progress = ((currentQuestionIndex + 1) / quizData.length) * 100;
      progressFill.style.width = `${progress}%`;
    }

    function showToast(message, type) {
      // Simple toast notification
      const toast = document.createElement('div');
      toast.textContent = message;
      toast.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 15px 25px;
        background: ${type === 'success' ? '#10b981' : '#ef4444'};
        color: white;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        z-index: 1000;
        animation: slideInRight 0.3s ease;
      `;
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.style.animation = 'slideOutRight 0.3s ease';
        setTimeout(() => toast.remove(), 300);
      }, 2000);
    }

    // Add animation styles for toast
    const style = document.createElement('style');
    style.textContent = `
      @keyframes slideInRight {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }
      
      @keyframes slideOutRight {
        from {
          transform: translateX(0);
          opacity: 1;
        }
        to {
          transform: translateX(100%);
          opacity: 0;
        }
      }
    `;
    document.head.appendChild(style);

    // Initialize quiz
    renderQuestion();
  </script>
</body>
</html>
